<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Түүх — Багаж Удирдлага</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="app">
  <div class="main">
    <div class="page-header">
      <div>
        <h1>Түүх</h1>
        <div class="sub">Хэн ямар багаж авсан, буцаасан эсэхийг харах</div>
      </div>
    </div>

    <div class="filters-bar">
      <input type="date" id="filterDate">
      <select id="filterStatus">
        <option value="">Бүх төлөв</option>
        <option value="borrow">Зөвхөн авсан</option>
        <option value="return">Зөвхөн буцаасан</option>
      </select>
      <input type="text" class="search-box" id="searchInput" placeholder="🔍 Хэрэглэгч эсвэл багажаар хайх...">
      <button class="btn btn-secondary btn-sm" onclick="clearFilters()">Цэвэрлэх</button>
    </div>

    <div id="historyContent">
      <p style="text-align:center; color:var(--text-dim); padding:30px;">Уншиж байна...</p>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="common.js"></script>
<script>
  document.querySelector(".app").insertAdjacentHTML("afterbegin", renderSidebar("history"));

  let transactionsCache = [];

  requireAuth(() => {
    loadHistory();
  });

  async function loadHistory() {
    const content = document.getElementById("historyContent");
    try {
      const snap = await db.collection("transactions")
        .orderBy("timestamp", "desc")
        .limit(500)
        .get();

      transactionsCache = [];
      snap.forEach(doc => transactionsCache.push({ id: doc.id, ...doc.data() }));

      renderGrid();
    } catch (err) {
      console.error(err);
      content.innerHTML = `<p style="text-align:center; color:var(--danger); padding:30px;">Алдаа: ${err.message}</p>`;
    }
  }

  function renderGrid() {
    const content = document.getElementById("historyContent");
    const dateFilter = document.getElementById("filterDate").value; // "2026-06-24" format
    const statusFilter = document.getElementById("filterStatus").value;
    const search = document.getElementById("searchInput").value.trim().toLowerCase();

    let filtered = transactionsCache.filter(tx => {
      const matchesDate = !dateFilter || dateOnlyString(tx.timestamp) === dateFilter;
      const matchesStatus = !statusFilter || tx.type === statusFilter;
      const haystack = `${tx.toolName || ""} ${tx.userName || ""} ${tx.userId || ""}`.toLowerCase();
      const matchesSearch = !search || haystack.includes(search);
      return matchesDate && matchesStatus && matchesSearch;
    });

    if (filtered.length === 0) {
      content.innerHTML = `<p style="text-align:center; color:var(--text-dim); padding:30px;">Тохирох бичлэг олдсонгүй</p>`;
      return;
    }

    // Нэг зэрэг авагдсан/буцаагдсан бичлэгүүдийг (borrowBatchId эсвэл
    // returnBatchId-аар) нэг бүлэг болгож нэгтгэнэ. batchId байхгүй
    // bichлэгүүд тус тусдаа (өөрийн ганцаарчилсан бүлэгт) үлдэнэ.
    const groups = [];
    const seenIds = new Set();

    filtered.forEach(tx => {
      if (seenIds.has(tx.id)) return;

      const batchKey = tx.type === "borrow" ? tx.borrowBatchId : tx.returnBatchId;
      let groupTxs;

      if (batchKey) {
        groupTxs = filtered.filter(t => {
          const key = t.type === "borrow" ? t.borrowBatchId : t.returnBatchId;
          return key === batchKey && t.type === tx.type;
        });
      } else {
        groupTxs = [tx];
      }

      groupTxs.forEach(t => seenIds.add(t.id));
      groups.push(groupTxs);
    });

    const grid = document.createElement("div");
    grid.className = "history-grid";

    groups.forEach(groupTxs => {
      grid.insertAdjacentHTML("beforeend", renderGroupCard(groupTxs));
    });

    content.innerHTML = "";
    content.appendChild(grid);
  }

  function renderGroupCard(groupTxs) {
    // Бүлэг доторх бичлэгүүд ихэвчлэн ижил pickupPhotoUrl/returnPhotoUrl
    // (нэг зэрэг авсан зураг) хуваалцдаг тул эхний бичлэгээс зургуудыг авна
    const first = groupTxs[0];
    const statusClass = first.type === "borrow" ? "borrowed" : "returned";
    const statusLabel = first.type === "borrow" ? "Авсан" : "Буцаасан";

    const pickupImg = first.pickupPhotoUrl
      ? `<img src="${first.pickupPhotoUrl}" alt="Авсан" style="cursor:zoom-in;" onclick="openImageViewer('${first.pickupPhotoUrl}')">`
      : `<div class="no-img">—</div>`;

    const returnImg = first.returnPhotoUrl
      ? `<img src="${first.returnPhotoUrl}" alt="Өгсөн" style="cursor:zoom-in;" onclick="openImageViewer('${first.returnPhotoUrl}')">`
      : `<div class="no-img">—</div>`;

    // Хэрвээ нэг зэрэг олон багаж бол, тус бүрийн catalog зургийг жижгээр
    // нэг "Багаж" слот дотор давхар харуулна (max 3 зураг)
    let catalogSlot;
    if (groupTxs.length === 1) {
      catalogSlot = first.catalogImageUrl
        ? `<img src="${first.catalogImageUrl}" alt="Багаж" style="cursor:zoom-in;" onclick="openImageViewer('${first.catalogImageUrl}')">`
        : `<div class="no-img">🛠️</div>`;
    } else {
      const thumbs = groupTxs.slice(0, 3).map(t => {
        if (!t.catalogImageUrl) return `<div style="width:32%; height:100%; display:flex; align-items:center; justify-content:center; opacity:.3;">🛠️</div>`;
        return `<img src="${t.catalogImageUrl}" style="width:32%; height:100%; object-fit:cover; cursor:zoom-in;" onclick="openImageViewer('${t.catalogImageUrl}')">`;
      }).join("");
      catalogSlot = `<div style="display:flex; gap:2px; width:100%; height:100%;">${thumbs}</div>`;
    }

    const unreturnablePill = first.unreturnable
      ? `<span class="status-pill" style="background:var(--danger-dim); color:var(--danger);">Буцаах боломжгүй</span>`
      : "";

    // Олон бичлэгтэй бол нэрсийг жагсаалт болгож, нэг хэрэгслийн нэрийн
    // оронд бүгдийг харуулна
    const namesHtml = groupTxs.length === 1
      ? escapeHtml(first.toolName || "—")
      : groupTxs.map(t => escapeHtml(t.toolName || "—")).join(", ");

    // Бүлгийн бүх id-г action товчинд дамжуулна (JSON-stringify хийж
    // attribute дотор хадгална)
    const idsJson = JSON.stringify(groupTxs.map(t => t.id)).replace(/"/g, "&quot;");
    const allUnreturnable = groupTxs.every(t => t.unreturnable);
    const unreturnableBtnLabel = allUnreturnable ? "Буцаах боломжтой болгох" : "Буцаах боломжгүй гэж тэмдэглэх";

    return `
      <div class="history-card">
        <div class="history-images">
          <div class="img-third">
            ${catalogSlot}
            <div class="img-label">Багаж${groupTxs.length > 1 ? ` (${groupTxs.length})` : ""}</div>
          </div>
          <div class="img-third">
            ${pickupImg}
            <div class="img-label">Авсан</div>
          </div>
          <div class="img-third">
            ${returnImg}
            <div class="img-label">Өгсөн</div>
          </div>
        </div>
        <div class="body">
          <div class="tool-name">${namesHtml}</div>
          <div class="meta-row">
            Авсан: ${formatDate(first.timestamp)}<br>
            ${first.returnTimestamp ? `Өгсөн: ${formatDate(first.returnTimestamp)}<br>` : ""}
          </div>
          <div style="display:flex; gap:6px; flex-wrap:wrap; margin-top:6px;">
            <span class="status-pill ${statusClass}">${statusLabel}</span>
            ${unreturnablePill}
          </div>
          <div style="display:flex; gap:6px; margin-top:10px;">
            <button class="btn btn-secondary btn-sm" style="flex:1;" onclick='toggleUnreturnableBatch(${idsJson}, ${!allUnreturnable})'>${unreturnableBtnLabel}</button>
            <button class="btn btn-danger btn-sm" onclick='deleteTransactionBatch(${idsJson})'>Устгах</button>
          </div>
        </div>
      </div>
    `;
  }

  function clearFilters() {
    document.getElementById("filterDate").value = "";
    document.getElementById("filterStatus").value = "";
    document.getElementById("searchInput").value = "";
    renderGrid();
  }

  document.getElementById("filterDate").addEventListener("change", renderGrid);
  document.getElementById("filterStatus").addEventListener("change", renderGrid);
  document.getElementById("searchInput").addEventListener("input", renderGrid);

  const DELETE_CODE = "99063452";

  async function deleteTransactionBatch(txIds) {
    const code = prompt("Устгахын тулд нууц кодоо оруулна уу:");
    if (code === null) return; // болих
    if (code !== DELETE_CODE) {
      showToast("Код буруу байна. Устгагдсангүй.", "error");
      return;
    }
    const confirmMsg = txIds.length > 1
      ? `Энэ ${txIds.length} бичлэгийг бүрмөсөн устгахдаа итгэлтэй байна уу? Энэ үйлдлийг буцаах боломжгүй.`
      : "Энэ бичлэгийг бүрмөсөн устгахдаа итгэлтэй байна уу? Энэ үйлдлийг буцаах боломжгүй.";
    if (!confirm(confirmMsg)) return;

    try {
      await Promise.all(txIds.map(id => db.collection("transactions").doc(id).delete()));
      showToast("Бичлэг устгагдлаа");
      transactionsCache = transactionsCache.filter(tx => !txIds.includes(tx.id));
      renderGrid();
    } catch (err) {
      console.error(err);
      showToast("Устгахад алдаа гарлаа: " + err.message, "error");
    }
  }

  async function toggleUnreturnableBatch(txIds, newValue) {
    try {
      await Promise.all(txIds.map(id => db.collection("transactions").doc(id).update({ unreturnable: newValue })));
      txIds.forEach(id => {
        const tx = transactionsCache.find(t => t.id === id);
        if (tx) tx.unreturnable = newValue;
      });
      showToast(newValue ? "Буцаах боломжгүй гэж тэмдэглэгдлээ" : "Буцаах боломжтой болгогдлоо");
      renderGrid();
    } catch (err) {
      console.error(err);
      showToast("Алдаа гарлаа: " + err.message, "error");
    }
  }
</script>

</body>
</html>
