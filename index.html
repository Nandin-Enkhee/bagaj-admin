<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Багаж Удирдлага — Нэвтрэх</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-border: #262b36;
    --accent: #4f8cff;
    --accent-hover: #6ba0ff;
    --text: #e8eaed;
    --text-dim: #9aa3b2;
    --danger: #ff5c5c;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 30% 20%, #1c2230 0%, var(--bg) 60%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--text);
  }
  .card {
    width: 100%;
    max-width: 380px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: var(--radius);
    padding: 40px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .logo {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), #2a5fd8);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 28px;
  }
  h1 {
    font-size: 20px;
    text-align: center;
    margin: 0 0 6px;
    font-weight: 600;
  }
  p.sub {
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
    margin: 0 0 28px;
  }
  label {
    display: block;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 6px;
    margin-top: 16px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--panel-border);
    background: #0f1218;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: var(--accent); }
  button {
    width: 100%;
    margin-top: 24px;
    padding: 13px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .error {
    margin-top: 16px;
    padding: 10px 14px;
    border-radius: 8px;
    background: rgba(255,92,92,0.1);
    border: 1px solid rgba(255,92,92,0.3);
    color: var(--danger);
    font-size: 13px;
    display: none;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">🛠️</div>
  <h1>Багаж Удирдлага</h1>
  <p class="sub">Admin системд нэвтрэх</p>

  <form id="loginForm">
    <label for="email">И-мэйл</label>
    <input type="email" id="email" required autocomplete="username" placeholder="admin@bagaj.mn">

    <label for="password">Нууц үг</label>
    <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">

    <button type="submit" id="loginBtn">Нэвтрэх</button>

    <div class="error" id="errorBox"></div>
  </form>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  // Хэрвээ аль хэдийн нэвтэрсэн бол шууд dashboard руу
  auth.onAuthStateChanged(user => {
    if (user) {
      window.location.href = "dashboard.html";
    }
  });

  const form = document.getElementById("loginForm");
  const errorBox = document.getElementById("errorBox");
  const loginBtn = document.getElementById("loginBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorBox.style.display = "none";
    loginBtn.disabled = true;
    loginBtn.textContent = "Шалгаж байна...";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      await auth.signInWithEmailAndPassword(email, password);
      window.location.href = "dashboard.html";
    } catch (err) {
      let msg = "Нэвтрэхэд алдаа гарлаа.";
      if (err.code === "auth/invalid-credential" || err.code === "auth/wrong-password" || err.code === "auth/user-not-found") {
        msg = "И-мэйл эсвэл нууц үг буруу байна.";
      } else if (err.code === "auth/invalid-email") {
        msg = "И-мэйл хаяг буруу байна.";
      } else if (err.code === "auth/too-many-requests") {
        msg = "Хэт олон удаа буруу оролдсон. Түр хүлээгээд дахин оролдоорой.";
      }
      errorBox.textContent = msg;
      errorBox.style.display = "block";
      loginBtn.disabled = false;
      loginBtn.textContent = "Нэвтрэх";
    }
  });
</script>

</body>
</html>
