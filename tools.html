<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Багаж — Багаж Удирдлага</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="app">
  <div class="main">
    <div class="page-header">
      <div>
        <h1>Багаж</h1>
        <div class="sub">Багаж нэмэх, засах, хасах</div>
      </div>
      <button class="btn btn-primary" onclick="openAddModal()">+ Шинэ багаж</button>
    </div>

    <div class="filters-bar">
      <input type="text" class="search-box" id="searchInput" placeholder="🔍 Багаж хайх...">
      <select id="filterCategory">
        <option value="">Бүх хайрцаг</option>
      </select>
    </div>

    <div class="card-grid" id="toolsGrid">
      <div style="color:var(--text-dim); padding:30px;">Уншиж байна...</div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none;">
  <div class="modal" style="position:relative;">
    <span class="close-x" onclick="closeModal()">✕</span>
    <h2 id="modalTitle">Шинэ багаж</h2>
    <form id="toolForm">

      <label>Зураг</label>
      <div class="image-capture" id="imageCaptureBox" onclick="document.getElementById('imageInput').click()">
        <div class="placeholder-text" id="imagePlaceholder">
          <span class="icon">📷</span>
          Дарж зураг авах эсвэл сан-аас сонгох
        </div>
        <img id="imagePreview" style="display:none;">
      </div>
      <input type="file" id="imageInput" accept="image/*" capture="environment">

      <label for="toolName">Багажийн нэр</label>
      <input type="text" id="toolName" required placeholder="Жишээ: Алх">

      <label for="toolCategory">Хайрцаг</label>
      <select id="toolCategory" required>
        <option value="">-- Сонгох --</option>
      </select>

      <label for="toolType">Ангилал (заавал биш)</label>
      <select id="toolType">
        <option value="">-- Сонгох --</option>
      </select>

      <label for="toolTotalQty">Нийт тоо ширхэг</label>
      <input type="number" id="toolTotalQty" required min="0" value="1">

      <label style="display:flex; align-items:center; gap:8px; margin-top:18px; cursor:pointer;">
        <input type="checkbox" id="toolConsumable" style="width:auto; margin:0;">
        <span style="color:var(--text); font-size:14px; font-weight:500;">Хэрэгсэл (буцаалт шаардлагагүй)</span>
      </label>

      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Болих</button>
        <button type="submit" class="btn btn-primary" id="saveBtn">Хадгалах</button>
      </div>
    </form>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="common.js"></script>
<script>
  document.querySelector(".app").insertAdjacentHTML("afterbegin", renderSidebar("tools"));

  let editingId = null;
  let toolsCache = [];
  let categoriesCache = [];
  let typesCache = [];
  let selectedImageBlob = null;
  let imageRemoved = false;

  requireAuth(() => {
    loadCategoriesIntoSelects();
    loadTypesIntoSelect();
    loadTools();
  });

  async function loadCategoriesIntoSelects() {
    try {
      const snap = await db.collection("categories").orderBy("name").get();
      categoriesCache = [];
      snap.forEach(doc => categoriesCache.push({ id: doc.id, ...doc.data() }));

      const filterSel = document.getElementById("filterCategory");
      const formSel = document.getElementById("toolCategory");

      categoriesCache.forEach(cat => {
        filterSel.insertAdjacentHTML("beforeend", `<option value="${cat.id}">${escapeHtml(cat.name)}</option>`);
        formSel.insertAdjacentHTML("beforeend", `<option value="${cat.id}">${escapeHtml(cat.name)}</option>`);
      });

      if (categoriesCache.length === 0) {
        showToast("Эхлээд хайрцаг үүсгэх хэрэгтэй", "error");
      }
    } catch (err) {
      console.error(err);
    }
  }

  async function loadTypesIntoSelect() {
    try {
      const snap = await db.collection("types").orderBy("name").get();
      typesCache = [];
      snap.forEach(doc => typesCache.push({ id: doc.id, ...doc.data() }));

      const formSel = document.getElementById("toolType");
      typesCache.forEach(type => {
        formSel.insertAdjacentHTML("beforeend", `<option value="${type.id}">${escapeHtml(type.name)}</option>`);
      });
    } catch (err) {
      console.error(err);
    }
  }

  async function loadTools() {
    const grid = document.getElementById("toolsGrid");
    try {
      const snap = await db.collection("tools").orderBy("name").get();
      toolsCache = [];
      snap.forEach(doc => toolsCache.push({ id: doc.id, ...doc.data() }));
      renderGrid();
    } catch (err) {
      console.error(err);
      grid.innerHTML = `<div style="color:var(--danger); padding:30px;">Алдаа: ${err.message}</div>`;
    }
  }

  function categoryName(id) {
    const cat = categoriesCache.find(c => c.id === id);
    return cat ? cat.name : "—";
  }

  function typeName(id) {
    const type = typesCache.find(t => t.id === id);
    return type ? type.name : null;
  }

  function renderGrid() {
    const grid = document.getElementById("toolsGrid");
    const search = document.getElementById("searchInput").value.trim().toLowerCase();
    const filterCat = document.getElementById("filterCategory").value;

    let filtered = toolsCache.filter(t => {
      const matchesSearch = !search || (t.name || "").toLowerCase().includes(search);
      const matchesCat = !filterCat || t.categoryId === filterCat;
      return matchesSearch && matchesCat;
    });

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column: 1/-1;">
          <div class="icon">🛠️</div>
          <div class="title">Багаж олдсонгүй</div>
          <div>Шинэ багаж нэмж эхлээрэй</div>
        </div>`;
      return;
    }

    grid.innerHTML = "";
    filtered.forEach(tool => {
      const available = tool.availableQty ?? 0;
      const total = tool.totalQty ?? 0;
      let qtyClass = "";
      if (available === 0) qtyClass = "zero";
      else if (available <= 2) qtyClass = "low";

      grid.insertAdjacentHTML("beforeend", `
        <div class="tool-card">
          <div class="img-wrap">
            ${tool.imageUrl
              ? `<img src="${tool.imageUrl}" alt="${escapeHtml(tool.name)}" style="cursor:zoom-in;" onclick="event.stopPropagation(); openImageViewer('${tool.imageUrl}')">`
              : `<div class="img-placeholder">🛠️</div>`}
          </div>
          <div class="body">
            <div class="category-tag">${escapeHtml(categoryName(tool.categoryId))}</div>
            ${tool.consumable ? `<div class="category-tag" style="background:var(--warning-dim, rgba(255,184,79,0.12)); color:var(--warning); margin-left:4px;">Хэрэгсэл</div>` : ""}
            <div class="name">${escapeHtml(tool.name)}</div>
            <div class="qty-row">
              <span>Боломжит:</span>
              <span class="qty-badge ${qtyClass}">${available} / ${total}</span>
            </div>
            <div class="actions">
              <button class="btn btn-secondary btn-sm" onclick="openEditModal('${tool.id}')">Засах</button>
              <button class="btn btn-danger btn-sm" onclick="deleteTool('${tool.id}')">Устгах</button>
            </div>
          </div>
        </div>
      `);
    });
  }

  document.getElementById("searchInput").addEventListener("input", renderGrid);
  document.getElementById("filterCategory").addEventListener("change", renderGrid);

  // ---- Image capture handling ----
  const imageInput = document.getElementById("imageInput");
  const imagePreview = document.getElementById("imagePreview");
  const imagePlaceholder = document.getElementById("imagePlaceholder");
  const imageCaptureBox = document.getElementById("imageCaptureBox");

  imageInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      selectedImageBlob = await compressImage(file, 800, 0.75);
      imageRemoved = false;
      const url = URL.createObjectURL(selectedImageBlob);
      imagePreview.src = url;
      imagePreview.style.display = "block";
      imagePlaceholder.style.display = "none";
      imageCaptureBox.classList.add("has-image");
    } catch (err) {
      showToast("Зураг боловсруулахад алдаа гарлаа", "error");
    }
  });

  function resetImageBox() {
    selectedImageBlob = null;
    imageRemoved = false;
    imagePreview.style.display = "none";
    imagePlaceholder.style.display = "block";
    imageCaptureBox.classList.remove("has-image");
    imageInput.value = "";
  }

  function openAddModal() {
    if (categoriesCache.length === 0) {
      showToast("Эхлээд хайрцаг үүсгэх хэрэгтэй", "error");
      return;
    }
    editingId = null;
    document.getElementById("modalTitle").textContent = "Шинэ багаж";
    document.getElementById("toolForm").reset();
    resetImageBox();
    document.getElementById("modalOverlay").style.display = "flex";
  }

  function openEditModal(id) {
    const tool = toolsCache.find(t => t.id === id);
    if (!tool) return;
    editingId = id;
    document.getElementById("modalTitle").textContent = "Багаж засах";
    document.getElementById("toolName").value = tool.name || "";
    document.getElementById("toolCategory").value = tool.categoryId || "";
    document.getElementById("toolType").value = tool.typeId || "";
    document.getElementById("toolTotalQty").value = tool.totalQty ?? 1;
    document.getElementById("toolConsumable").checked = !!tool.consumable;
    resetImageBox();
    if (tool.imageUrl) {
      imagePreview.src = tool.imageUrl;
      imagePreview.style.display = "block";
      imagePlaceholder.style.display = "none";
      imageCaptureBox.classList.add("has-image");
    }
    document.getElementById("modalOverlay").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("modalOverlay").style.display = "none";
  }

  document.getElementById("toolForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const saveBtn = document.getElementById("saveBtn");
    saveBtn.disabled = true;
    saveBtn.textContent = "Хадгалж байна...";

    const name = document.getElementById("toolName").value.trim();
    const categoryId = document.getElementById("toolCategory").value;
    const typeId = document.getElementById("toolType").value || null;
    const consumable = document.getElementById("toolConsumable").checked;
    const totalQty = parseInt(document.getElementById("toolTotalQty").value, 10);

    try {
      let imageUrl = null;
      if (editingId) {
        const existing = toolsCache.find(t => t.id === editingId);
        imageUrl = existing.imageUrl || null;
      }

      // Шинэ зураг сонгосон бол Storage руу upload хийнэ
      if (selectedImageBlob) {
        const filename = `tools/${Date.now()}_${Math.random().toString(36).slice(2)}.jpg`;
        const ref = storage.ref(filename);
        await ref.put(selectedImageBlob);
        imageUrl = await ref.getDownloadURL();
      }

      if (editingId) {
        const existing = toolsCache.find(t => t.id === editingId);
        const oldTotal = existing.totalQty ?? 0;
        const oldAvailable = existing.availableQty ?? 0;
        const borrowedCount = oldTotal - oldAvailable;
        // Шинэ нийт тоог тооцоод, боломжит тоог тохируулна (зээлсэн тоог хадгална)
        const newAvailable = Math.max(0, totalQty - borrowedCount);

        await db.collection("tools").doc(editingId).update({
          name, categoryId, typeId, consumable, totalQty,
          availableQty: newAvailable,
          imageUrl
        });
        showToast("Багаж шинэчлэгдлээ");
      } else {
        await db.collection("tools").add({
          name, categoryId, typeId, consumable, totalQty,
          availableQty: totalQty,
          imageUrl,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast("Шинэ багаж нэмэгдлээ");
      }
      closeModal();
      loadTools();
    } catch (err) {
      console.error(err);
      showToast("Алдаа гарлаа: " + err.message, "error");
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = "Хадгалах";
    }
  });

  const DELETE_CODE = "1515";

  async function deleteTool(id) {
    const code = prompt("Устгахын тулд нууц кодоо оруулна уу:");
    if (code === null) return; // болих
    if (code !== DELETE_CODE) {
      showToast("Код буруу байна. Устгагдсангүй.", "error");
      return;
    }
    if (!confirm("Энэ багажийг устгахдаа итгэлтэй байна уу?")) return;
    try {
      await db.collection("tools").doc(id).delete();
      showToast("Багаж устгагдлаа");
      loadTools();
    } catch (err) {
      showToast("Устгахад алдаа гарлаа: " + err.message, "error");
    }
  }
</script>

</body>
</html>
